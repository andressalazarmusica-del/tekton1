<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon profil — Tekton</title>
  <link rel="stylesheet" href="../css/style.css">

  <!-- Firebase compat: scripts clásicos, sin módulos ES -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    .card       { background:#fff; border-radius:10px; border:1px solid #e0ddd8; padding:1.8rem; margin-bottom:1.4rem; }
    .card-title { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#aaa; margin-bottom:1.1rem; }
    .av         { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #e07b1a; display:block; }
    .av-ph      { width:80px; height:80px; border-radius:50%; background:#2c2c2c; border:3px solid #e07b1a; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:700; color:#666; }
    .tgl        { position:relative; width:44px; height:24px; display:inline-block; cursor:pointer; }
    .tgl input  { opacity:0; width:0; height:0; position:absolute; }
    .tgl-t      { position:absolute; inset:0; background:#ccc; border-radius:12px; transition:background .2s; }
    .tgl-t::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .2s; }
    .tgl input:checked + .tgl-t          { background:#e07b1a; }
    .tgl input:checked + .tgl-t::after   { transform:translateX(20px); }
    .stag     { display:inline-block; padding:.28rem .75rem; border-radius:20px; font-size:.78rem; font-weight:500; border:1.5px solid #e0ddd8; cursor:pointer; background:#fff; color:#555; transition:all .15s; margin:.2rem; user-select:none; }
    .stag.on  { background:#e07b1a; border-color:#e07b1a; color:#fff; }
    .step-row { display:flex; align-items:flex-start; gap:.7rem; padding:.5rem 0; border-bottom:1px solid #f0ede8; }
    .step-row:last-child { border-bottom:none; }
    .sdot     { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.68rem; font-weight:700; flex-shrink:0; margin-top:.1rem; }
    .sdot-on  { background:#e07b1a; color:#fff; }
    .sdot-off { background:#eee; color:#bbb; border:1.5px solid #ddd; }
    @media(max-width:768px){ .two-col { grid-template-columns:1fr !important; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="../index.html" class="brand">TEK<span>TON</span></a>
    <div class="nav-links hide-mob">
      <a href="dashboard.html" class="nav-link">← Mon espace</a>
    </div>
    <div id="nav-user"></div>
  </div>
</nav>

<div style="background:#1a1a1a;padding:1.6rem 0 1.3rem;">
  <div class="container">
    <div class="bc">
      <a href="../index.html">Accueil</a><span>›</span>
      <a href="dashboard.html">Mon espace</a><span>›</span>
      <span style="color:#666;">Mon profil</span>
    </div>
    <h1 style="color:#fff;font-size:1.9rem;margin-top:.4rem;">Modifier mon profil</h1>
  </div>
</div>

<main class="section">
  <div class="container">

    <div id="msg-ok"  class="alert alert-ok"  style="margin-bottom:1.2rem;max-width:700px;display:none;"></div>
    <div id="msg-err" class="alert alert-err" style="margin-bottom:1.2rem;max-width:700px;display:none;"></div>

    <div id="loading" style="text-align:center;padding:3rem 0;">
      <div class="spinner" style="margin:0 auto 1rem;"></div>
      <p style="color:#aaa;">Chargement…</p>
    </div>

    <div id="content" style="display:none;">
      <div style="display:grid;grid-template-columns:1fr 240px;gap:2rem;align-items:start;" class="two-col">

        <div style="max-width:700px;">

          <!-- FOTO -->
          <div class="card">
            <div class="card-title">Photo & Disponibilité</div>
            <div style="display:flex;align-items:center;gap:1.4rem;flex-wrap:wrap;margin-bottom:1rem;">
              <div id="av-wrap"><div class="av-ph" id="av-ph">?</div></div>
              <div style="display:flex;flex-direction:column;gap:.5rem;">
                <label class="btn btn-outline btn-sm" style="cursor:pointer;">
                  📷 Uploader
                  <input type="file" id="f-file" accept="image/*" style="display:none;">
                </label>
                <span style="font-size:.72rem;color:#bbb;text-align:center;">— ou URL —</span>
                <input type="url" class="form-control" id="f-photo"
                  placeholder="https://…" style="font-size:.82rem;padding:.4rem .7rem;min-width:200px;">
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:.8rem;">
              <label class="tgl">
                <input type="checkbox" id="f-avail" checked>
                <div class="tgl-t"></div>
              </label>
              <span id="avail-lbl" style="font-size:.88rem;font-weight:600;color:#1e7e34;">● Disponible</span>
            </div>
          </div>

          <!-- INFO BASE -->
          <div class="card">
            <div class="card-title">Informations de base</div>
            <div style="display:flex;flex-direction:column;gap:1rem;">
              <div class="form-grid">
                <div class="form-group">
                  <label>Nom complet *</label>
                  <input type="text" class="form-control" id="f-name" placeholder="Jean Dupont">
                </div>
                <div class="form-group">
                  <label>Métier *</label>
                  <select class="form-control" id="f-trade">
                    <option value="">Sélectionner…</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label>Zone d'intervention *</label>
                <input type="text" class="form-control" id="f-city" placeholder="Paris 15e…">
              </div>
              <div class="form-group">
                <label>Présentation * <small style="font-weight:400;color:#bbb;">(min. 50 car.)</small></label>
                <textarea class="form-control" id="f-desc" rows="4"
                  placeholder="Décrivez votre expérience…"></textarea>
                <span class="form-hint"><span id="cc">0</span>/800</span>
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label>Téléphone</label>
                  <input type="tel" class="form-control" id="f-phone" placeholder="06 12 34 56 78">
                </div>
                <div class="form-group">
                  <label>E-mail de contact</label>
                  <input type="email" class="form-control" id="f-email" placeholder="pro@email.com">
                </div>
              </div>
              <div class="form-group">
                <label>Années d'expérience</label>
                <input type="number" class="form-control" id="f-years"
                  min="0" max="60" placeholder="Ex: 8" style="max-width:140px;">
              </div>
            </div>
          </div>

          <!-- SPÉCIALITÉS -->
          <div class="card">
            <div class="card-title">Spécialités</div>
            <p style="font-size:.83rem;color:#999;margin-bottom:.7rem;">Cliquez pour sélectionner.</p>
            <div id="spec-tags"></div>
          </div>

          <!-- TARIFS -->
          <div class="card">
            <div class="card-title">Tarifs & Travaux</div>
            <div style="display:flex;flex-direction:column;gap:1rem;">
              <div class="form-group">
                <label>Comment facturez-vous ?</label>
                <select class="form-control" id="f-rtype">
                  <option value="">Non renseigné</option>
                  <option value="hourly">À l'heure</option>
                  <option value="project">Au projet</option>
                  <option value="both">À l'heure ou au projet</option>
                  <option value="quote">Toujours sur devis</option>
                </select>
              </div>
              <div id="rate-range" style="display:none;">
                <div class="form-grid">
                  <div class="form-group">
                    <label>Tarif min (€/h)</label>
                    <input type="number" class="form-control" id="f-rmin" min="0" placeholder="35">
                  </div>
                  <div class="form-group">
                    <label>Tarif max (€/h)</label>
                    <input type="number" class="form-control" id="f-rmax" min="0" placeholder="65">
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label>Note sur les tarifs</label>
                <input type="text" class="form-control" id="f-rnote"
                  placeholder="Ex: Déplacement gratuit dans Paris…">
              </div>
              <div class="form-group">
                <label>Types de travaux acceptés</label>
                <div id="job-tags" style="margin-top:.4rem;"></div>
              </div>
            </div>
          </div>

          <div style="display:flex;align-items:center;gap:1rem;padding-bottom:2rem;">
            <button class="btn btn-primary btn-lg" id="btn-save" type="button">
              💾 Enregistrer
            </button>
            <a href="dashboard.html" style="font-size:.85rem;color:#aaa;">Annuler</a>
          </div>

        </div>

        <!-- SIDEBAR -->
        <div style="position:sticky;top:80px;background:#fff;border-radius:10px;border:1px solid #e0ddd8;padding:1.4rem;">
          <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#e07b1a;margin-bottom:.9rem;">Vos étapes</div>
          <div id="steps"></div>
        </div>

      </div>
    </div>

  </div>
</main>

<footer>
  <div class="container footer-in">
    <div class="footer-brand">TEK<span>TON</span></div>
    <div class="footer-links">
      <a href="dashboard.html">Mon espace</a>
      <a href="workers.html">Professionnels</a>
    </div>
    <div style="font-size:.76rem;color:#333;">© 2024 Tekton</div>
  </div>
</footer>

<script>
// ─────────────────────────────────────────────────────────────
// Firebase compat API — sin módulos ES, funciona igual que
// la versión de registro y login que ya funcionan.
// ─────────────────────────────────────────────────────────────

if (!firebase.apps.length) { firebase.initializeApp({
  apiKey:            "AIzaSyCkzl2sPvDZ4cn3QdfikiREas5U5KUjfEA",
  authDomain:        "tekton-5d2da.firebaseapp.com",
  projectId:         "tekton-5d2da",
  storageBucket:     "tekton-5d2da.firebasestorage.app",
  messagingSenderId: "420545398258",
  appId:             "1:420545398258:web:ac73c77ef1dc83b261576b"
  });
}

var auth = firebase.auth();
var db   = firebase.firestore();

// ── Datos ──────────────────────────────────────────────────────
var TRADES = [
  {v:'electricien', l:'Électricien',  e:'⚡'},
  {v:'plombier',    l:'Plombier',     e:'🔧'},
  {v:'peintre',     l:'Peintre',      e:'🖌️'},
  {v:'menuisier',   l:'Menuisier',    e:'🪵'},
  {v:'carreleur',   l:'Carreleur',    e:'🪨'},
  {v:'macon',       l:'Maçon',        e:'🧱'},
  {v:'charpentier', l:'Charpentier',  e:'🏗️'},
  {v:'couvreur',    l:'Couvreur',     e:'🏠'},
  {v:'plaquier',    l:'Plaquiste',    e:'📋'},
  {v:'serrurier',   l:'Serrurier',    e:'🔑'},
  {v:'chauffagiste',l:'Chauffagiste', e:'🔥'},
  {v:'paysagiste',  l:'Paysagiste',   e:'🌿'},
  {v:'autre',       l:'Autre',        e:'🛠️'},
];

var SPECS = {
  electricien:   ['Tableau électrique','Mise aux normes','Domotique','Borne VE','Éclairage','Alarme'],
  plombier:      ['Fuite / Dépannage','Salle de bain','Chaudière','Chauffage central','Robinetterie'],
  peintre:       ['Peinture intérieure','Peinture extérieure','Enduit','Papier peint','Ravalement'],
  menuisier:     ['Placards sur mesure','Escaliers','Parquet','Fenêtres','Portes','Terrasse bois'],
  carreleur:     ['Salle de bain','Cuisine','Terrasse','Sol chauffant','Mosaïque'],
  macon:         ['Démolition','Mur porteur','Extension','Ravalement','Construction neuve'],
  charpentier:   ['Charpente traditionnelle','Ossature bois','Mezzanine','Isolation'],
  couvreur:      ['Tuiles','Ardoises','Zinc','Velux','Étanchéité','Gouttières'],
  plaquier:      ['Cloisons','Faux plafond','Isolation phonique','Doublage'],
  serrurier:     ['Serrure','Porte blindée','Portail','Clôture','Interphone'],
  chauffagiste:  ['Chaudière gaz','Pompe à chaleur','Plancher chauffant','VMC','Climatisation'],
  paysagiste:    ['Jardin','Terrasse','Arrosage automatique','Élagage','Gazon'],
  autre:         ['Rénovation générale','Bricolage','Multi-services'],
};

var JOBS = [
  'Petits travaux','Rénovation complète','Dépannage urgence',
  'Construction neuve','Week-end disponible','Devis gratuit',
];

// ── Estado ─────────────────────────────────────────────────────
var _user  = null;
var _wid   = null;
var _specs = [];
var _jobs  = [];
var _b64   = null;

// ── Helpers ────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, function(m) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];
  });
}

function initials(n) {
  return (n || '?').split(' ').map(function(x){ return x[0]; }).join('').substring(0,2).toUpperCase();
}

function showMsg(type, html) {
  $('msg-ok').style.display  = 'none';
  $('msg-err').style.display = 'none';
  var el = type === 'ok' ? $('msg-ok') : $('msg-err');
  el.innerHTML     = html;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function setVal(id, val) {
  var el = $(id);
  if (el) el.value = (val === null || val === undefined) ? '' : String(val);
}

function setAvatar(src, name) {
  var wrap = $('av-wrap');
  if (src) {
    var img = document.createElement('img');
    img.src       = src;
    img.className = 'av';
    img.alt       = name || '';
    img.onerror   = function() {
      wrap.innerHTML = '<div class="av-ph">' + initials(name) + '</div>';
    };
    wrap.innerHTML = '';
    wrap.appendChild(img);
  } else {
    wrap.innerHTML = '<div class="av-ph">' + initials(name) + '</div>';
  }
}

// ── Pasos ──────────────────────────────────────────────────────
function renderSteps(hasProfile) {
  var steps = [
    { done: hasProfile, label: 'Créer votre profil public', sub: hasProfile ? 'Profil visible ✓' : 'Complétez et enregistrez' },
    { done: false, label: 'Vérifier votre e-mail',  sub: 'Prochainement' },
    { done: false, label: 'Envoyer des demandes',   sub: 'Prochainement' },
  ];
  $('steps').innerHTML = steps.map(function(s) {
    return '<div class="step-row">' +
      '<div class="sdot ' + (s.done ? 'sdot-on' : 'sdot-off') + '">' + (s.done ? '✓' : '○') + '</div>' +
      '<div>' +
        '<div style="font-size:.84rem;font-weight:600;color:' + (s.done ? '#333' : '#888') + ';">' + s.label + '</div>' +
        '<div style="font-size:.74rem;color:#bbb;">' + s.sub + '</div>' +
      '</div></div>';
  }).join('');
}

// ── Tags especialidades ────────────────────────────────────────
function buildSpecTags(trade) {
  var list = SPECS[trade] || SPECS['autre'];
  var container = $('spec-tags');
  container.innerHTML = '';
  list.forEach(function(s) {
    var btn = document.createElement('button');
    btn.type      = 'button';
    btn.className = 'stag' + (_specs.indexOf(s) >= 0 ? ' on' : '');
    btn.textContent = s;
    btn.onclick = function() {
      var idx = _specs.indexOf(s);
      if (idx >= 0) { _specs.splice(idx, 1); btn.classList.remove('on'); }
      else          { _specs.push(s);        btn.classList.add('on'); }
    };
    container.appendChild(btn);
  });
}

// ── Tags tipos de trabajo ──────────────────────────────────────
function buildJobTags(selected) {
  var container = $('job-tags');
  container.innerHTML = '';
  JOBS.forEach(function(j) {
    var btn = document.createElement('button');
    btn.type      = 'button';
    btn.className = 'stag' + (selected.indexOf(j) >= 0 ? ' on' : '');
    btn.textContent = j;
    btn.onclick = function() {
      var idx = _jobs.indexOf(j);
      if (idx >= 0) { _jobs.splice(idx, 1); btn.classList.remove('on'); }
      else          { _jobs.push(j);        btn.classList.add('on'); }
    };
    container.appendChild(btn);
  });
}

// ── Cargar perfil existente ────────────────────────────────────
function loadWorker(uid) {
  db.collection('workers').where('userId', '==', uid).get()
    .then(function(snap) {
      if (!snap.empty) {
        var docSnap = snap.docs[0];
        _wid = docSnap.id;
        var w = docSnap.data();

        setVal('f-name',  w.name);
        setVal('f-city',  w.city);
        setVal('f-desc',  w.description);
        setVal('f-phone', w.phone);
        setVal('f-email', w.email);
        setVal('f-years', w.yearsExp);
        setVal('f-rtype', w.rateType);
        setVal('f-rmin',  w.rateMin);
        setVal('f-rmax',  w.rateMax);
        setVal('f-rnote', w.rateNote);

        if (w.photo && w.photo.indexOf('data:') !== 0) setVal('f-photo', w.photo);
        if (w.photo && w.photo.indexOf('data:') === 0) _b64 = w.photo;

        $('cc').textContent = (w.description || '').length;

        if (w.trade) $('f-trade').value = w.trade;

        if (w.available === false) {
          $('f-avail').checked = false;
          $('avail-lbl').innerHTML = '<span style="color:#888;">●</span> Occupé';
        }

        if (w.photo) setAvatar(w.photo, w.name || '');

        var rt = w.rateType || '';
        $('rate-range').style.display = (rt === 'hourly' || rt === 'both') ? 'block' : 'none';

        _specs = Array.isArray(w.specialties) ? w.specialties.slice() : [];
        _jobs  = Array.isArray(w.jobTypes)    ? w.jobTypes.slice()    : [];

        buildSpecTags(w.trade || 'autre');
        buildJobTags(_jobs);
        renderSteps(true);
      } else {
        buildSpecTags('autre');
        buildJobTags([]);
        renderSteps(false);
      }

      $('loading').style.display = 'none';
      $('content').style.display = 'block';
    })
    .catch(function(e) {
      showMsg('err', 'Erreur chargement : ' + e.message);
      $('loading').style.display = 'none';
      $('content').style.display = 'block';
    });
}

// ── GUARDAR ────────────────────────────────────────────────────
function saveProfile() {
  var name  = $('f-name').value.trim();
  var trade = $('f-trade').value;
  var city  = $('f-city').value.trim();
  var desc  = $('f-desc').value.trim();
  var phone = $('f-phone').value.trim();
  var email = $('f-email').value.trim();
  var years = $('f-years').value;
  var avail = $('f-avail').checked;
  var rtype = $('f-rtype').value;
  var rmin  = $('f-rmin').value;
  var rmax  = $('f-rmax').value;
  var rnote = $('f-rnote').value.trim();
  var purl  = $('f-photo').value.trim();

  if (!name)            { showMsg('err', 'Le nom est requis.');                                return; }
  if (!trade)           { showMsg('err', 'Choisissez un métier.');                            return; }
  if (!city)            { showMsg('err', "La zone d'intervention est requise.");               return; }
  if (desc.length < 50) { showMsg('err', 'La description doit faire au moins 50 caractères.'); return; }
  if (!phone && !email) { showMsg('err', 'Au moins un contact est requis.');                   return; }

  var btn = $('btn-save');
  btn.disabled    = true;
  btn.textContent = 'Enregistrement…';

  var photo = _b64 || purl || '';

  var data = {
    name:        esc(name),
    trade:       trade,
    city:        esc(city),
    description: esc(desc),
    phone:       esc(phone),
    email:       esc(email),
    photo:       photo,
    yearsExp:    years ? parseInt(years) : null,
    available:   avail,
    specialties: _specs,
    jobTypes:    _jobs,
    rateType:    rtype  || null,
    rateMin:     rmin   ? parseInt(rmin) : null,
    rateMax:     rmax   ? parseInt(rmax) : null,
    rateNote:    esc(rnote),
    userId:      _user.uid,
    updatedAt:   firebase.firestore.FieldValue.serverTimestamp(),
  };

  var promise;

  if (_wid) {
    promise = db.collection('workers').doc(_wid).update(data);
  } else {
    data.verified    = false;
    data.rating      = 0;
    data.reviewCount = 0;
    data.createdAt   = firebase.firestore.FieldValue.serverTimestamp();
    var newRef = db.collection('workers').doc();
    _wid = newRef.id;
    promise = newRef.set(data);
  }

  promise
    .then(function() {
      renderSteps(true);
      showMsg('ok',
        '✅ Profil enregistré ! ' +
        '<a href="profile.html?id=' + _wid + '" style="color:#1e7e34;font-weight:700;">' +
        'Voir mon profil public →</a>'
      );
    })
    .catch(function(e) {
      showMsg('err', '❌ Erreur : ' + e.message);
    })
    .finally(function() {
      // finally garantiza que el botón SIEMPRE se re-habilita
      btn.disabled    = false;
      btn.textContent = '💾 Enregistrer';
    });
}

// ── Inicializar cuando Firebase confirma sesión ────────────────
auth.onAuthStateChanged(function(user) {
  if (!user) { location.href = 'login.html'; return; }
  _user = user;

  // Navbar
  $('nav-user').innerHTML =
    '<a href="dashboard.html" class="btn-nav-ghost hide-mob">Mon espace</a>' +
    '<button class="btn-nav" onclick="firebase.auth().signOut().then(function(){ location.href=\'../index.html\'; })">Déconnexion</button>';

  // Poblar select de oficios
  TRADES.forEach(function(t) {
    var o = document.createElement('option');
    o.value = t.v;
    o.textContent = t.e + ' ' + t.l;
    $('f-trade').appendChild(o);
  });

  // Listeners
  $('f-avail').onchange = function() {
    $('avail-lbl').innerHTML = this.checked
      ? '<span style="color:#1e7e34;">●</span> Disponible'
      : '<span style="color:#888;">●</span> Occupé';
  };

  $('f-desc').oninput = function() {
    var l = Math.min(this.value.length, 800);
    $('cc').textContent = l;
    if (this.value.length > 800) this.value = this.value.substring(0, 800);
  };

  $('f-trade').onchange = function() {
    _specs = [];
    buildSpecTags(this.value || 'autre');
  };

  $('f-rtype').onchange = function() {
    $('rate-range').style.display =
      (this.value === 'hourly' || this.value === 'both') ? 'block' : 'none';
  };

  $('f-file').onchange = function() {
    var file = this.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showMsg('err', 'Image trop lourde (max 5 MB).'); return; }
    var r = new FileReader();
    r.onload = function(e) {
      _b64 = e.target.result;
      $('f-photo').value = '';
      setAvatar(_b64, $('f-name').value);
    };
    r.readAsDataURL(file);
  };

  $('f-photo').oninput = function() {
    if (this.value.trim()) {
      _b64 = null;
      setAvatar(this.value.trim(), $('f-name').value);
    }
  };

  $('btn-save').onclick = saveProfile;

  // Cargar datos
  loadWorker(user.uid);
});
</script>

</body>
</html>
